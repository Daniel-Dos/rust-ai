name: CI

on:
  push:
    branches: [master, develop, feature/**, fix/**]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Start NATS
        run: docker run --rm -d -p 4222:4222 --name nats-server nats

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run fmt
        run: cargo fmt --check